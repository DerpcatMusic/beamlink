<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Beamlink</title>
    <meta
      name="description"
      content="Open-source, self-hosted music smartlinks and presaves on Cloudflare Workers."
    />
    <style>
      :root {
        color-scheme: dark;
        --bg: #060608;
        --ink: #f4f5f7;
        --muted: #a4a8b5;
        --line: rgba(255, 255, 255, 0.12);
        --beam: #6d9cff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 70% 20%, rgba(109, 156, 255, 0.2), transparent 32rem),
          linear-gradient(180deg, #08090d, var(--bg));
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(46rem, calc(100% - 2rem));
        padding-block: 5rem;
      }

      .mark {
        display: inline-flex;
        align-items: center;
        gap: 0.65rem;
        color: var(--muted);
        font-weight: 600;
      }

      .dot {
        width: 0.9rem;
        height: 0.9rem;
        border-radius: 0.25rem;
        background: linear-gradient(150deg, #a8c4ff, var(--beam));
        box-shadow: 0 0 22px rgba(109, 156, 255, 0.7);
      }

      h1 {
        margin: 1.5rem 0 1rem;
        max-width: 11ch;
        font-size: clamp(3rem, 10vw, 6.5rem);
        line-height: 0.95;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        max-width: 38rem;
        color: var(--muted);
        font-size: clamp(1.05rem, 2vw, 1.25rem);
        line-height: 1.6;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin-top: 2rem;
      }

      a {
        min-height: 2.75rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0.65rem 1rem;
        color: var(--ink);
        text-decoration: none;
        font-weight: 650;
      }

      a.primary {
        border-color: transparent;
        background: var(--beam);
        color: #08101f;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark"><span class="dot" aria-hidden="true"></span>Beamlink</div>
      <h1>One link for your release.</h1>
      <p>
        Open-source, self-hosted music smartlinks and presaves on Cloudflare Workers,
        with first-party Meta CAPI tracking and fast edge-rendered fan pages.
      </p>
      <div class="actions">
        <a class="primary" href="https://github.com/DerpcatMusic/beamlink">Get the code</a>
        <a href="https://github.com/DerpcatMusic/beamlink#setup">Read setup</a>
      </div>
    </main>
  </body>
</html>
